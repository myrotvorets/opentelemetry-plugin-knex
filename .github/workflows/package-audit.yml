name: Package Audit

on:
  push:
    branches:
      - '**'
    paths:
      - package.json
      - package-lock.json
      - .github/workflows/package-audit.yml
  workflow_dispatch:

permissions:
  contents: read

jobs:
  audit-npm:
    name: NPM Audit
    runs-on: ubuntu-latest
    steps:
      - name: Audit with NPM
        uses: myrotvorets/composite-actions/node-package-audit@c4c07ee643990a78097e4d7b1a1fe481b0f2c3f9 # master
