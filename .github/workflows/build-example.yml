name: Build and Test Sample Code

on:
  push:
    branches:
      - master
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node:
          - 'current'
          - 'lts/*'
          - 'lts/-1'
    name: Build and test (Node ${{ matrix.node }})
    permissions:
      contents: read
    steps:
      - name: Prepare the source
        uses: myrotvorets/composite-actions/build-test-nodejs@c4c07ee643990a78097e4d7b1a1fe481b0f2c3f9 # master
        with:
          node-version: ${{ matrix.node }}
          run-tests: no

      - name: Install dependencies (example)
        run: npm ci
        working-directory: example

      - name: Build
        run: npm run build && (cd example && npm run build)

      - name: Smoke test
        run: npx ts-node src/index.ts
        working-directory: example
